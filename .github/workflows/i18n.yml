name: update-translate-files
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
    types:
    - closed
jobs:
  deploy:
    if: (github.event_name == 'push') || github.event.pull_request.merged == true
    runs-on: ubuntu-18.04
    steps:
      - name: Git checkout
        uses: actions/checkout@v2

      - run: npm install
      - run: npm run build
      - run: npm run write-translations
      - run: npm run crowdin-upload
